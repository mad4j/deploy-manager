syntax = "proto3";

package deploy_manager;

// DeployManager gRPC service – remote execution interface.
service DeployManager {
    // Execute a deploy file by path, returning success/failure and a log summary.
    rpc Execute(ExecuteRequest) returns (ExecuteResponse);
}

message ExecuteRequest {
    // Absolute or relative path to the YAML deploy file on the server.
    string file_path = 1;

    // When true, validate the deploy file but do not run any actions.
    bool dry_run = 2;

    // When true, emit debug-level log output.
    bool verbose = 3;
}

message ExecuteResponse {
    // Whether all actions completed successfully.
    bool success = 1;

    // Human-readable status message or error description.
    string message = 2;
}
