# Long-running Windows demo for testing progress bar and log output

actions:
  - name: prepare-demo-dir
    action: filesystem
    operation: create_dir
    destination: ./target/demo-progress/staging

  - name: simulate-download
    action: shell
    command: pwsh -NoLogo -NoProfile -Command "1..4 | ForEach-Object { Write-Output ('Downloading chunk ' + $_ + '/4'); Start-Sleep -Seconds 1 }"
    fail_on_error: true

  - name: stage-manifest
    action: deploy
    file: ./examples/example-deploy.yaml
    target: local
    type: script

  - name: simulate-health-check
    action: shell
    command: pwsh -NoLogo -NoProfile -Command "1..3 | ForEach-Object { Write-Output ('Health check step ' + $_ + '/3'); Start-Sleep -Seconds 2 }"
    fail_on_error: true

  - name: confirm-staging
    action: wait
    depends_on:
      - stage-manifest
      - simulate-health-check
    timeout_secs: 30

  - name: finalize-demo
    action: shell
    command: pwsh -NoLogo -NoProfile -Command "Write-Output 'Finalizing deployment view'; Start-Sleep -Seconds 2; Write-Output 'Demo completed'"
    fail_on_error: true